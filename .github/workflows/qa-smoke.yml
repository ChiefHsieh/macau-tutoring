name: QA Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
      E2E_STUDENT_PASSWORD: ${{ secrets.E2E_STUDENT_PASSWORD }}
      E2E_TUTOR_ID: ${{ secrets.E2E_TUTOR_ID }}
      E2E_SIGNUP_EMAIL_PREFIX: ${{ secrets.E2E_SIGNUP_EMAIL_PREFIX }}
      E2E_SIGNUP_PASSWORD: ${{ secrets.E2E_SIGNUP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Route/button snapshot check
        run: npm run test:routes

      - name: Check E2E secrets readiness
        id: e2e_ready
        shell: bash
        run: |
          missing=0
          for key in E2E_BASE_URL E2E_STUDENT_EMAIL E2E_STUDENT_PASSWORD E2E_TUTOR_ID E2E_SIGNUP_EMAIL_PREFIX E2E_SIGNUP_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::warning::Missing secret/env: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: E2E smoke tests
        if: steps.e2e_ready.outputs.ready == 'true'
        run: npm run test:e2e

      - name: Skip notice for E2E
        if: steps.e2e_ready.outputs.ready != 'true'
        run: echo "E2E secrets are not fully configured, skipped npm run test:e2e."

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
